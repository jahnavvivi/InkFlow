<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desi-Scribe AI: Document Generator</title>
    <!-- Tailwind CSS for instant, beautiful styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white font-sans p-10">

    <div class="max-w-4xl mx-auto bg-gray-800 p-8 rounded-lg shadow-xl">
        <h1 class="text-3xl font-bold mb-2">Desi-Scribe AI: Document Generator</h1>
        <p class="text-gray-400 mb-8">Turn plain text into hyper-realistic handwritten documents.</p>

        <form action="/generate-document" method="POST" class="space-y-6">

            <!-- Deliverable 1: Text Input -->
            <div>
                <label class="block text-sm font-medium mb-2">Document Text</label>
                <textarea name="text_content" rows="6"
                    class="w-full p-3 bg-gray-700 rounded border border-gray-600 text-white focus:ring-blue-500 focus:border-blue-500"
                    placeholder="Type or paste your text here..." required></textarea>
            </div>

            <!-- Deliverable 2: Select Presets -->
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Handwriting Style</label>
                    <select name="style" class="w-full p-3 bg-gray-700 rounded border border-gray-600 text-white">
                        {% for preset in presets %}
                        <option value="{{ preset }}">{{ preset }}</option>
                        {% endfor %}
                        <option value="custom">My Custom Uploaded Style</option>
                    </select>
                </div>

                <!-- Deliverable 4: Realism Settings -->
                <div>
                    <label class="block text-sm font-medium mb-2">Export & Realism</label>
                    <div class="flex items-center mt-3">
                        <input type="checkbox" name="realism" id="realism"
                            class="w-5 h-5 text-blue-600 bg-gray-700 border-gray-600 rounded focus:ring-blue-500">
                        <label for="realism" class="ml-2 text-sm text-gray-300">Apply Ink Bleed & Paper Shadows</label>
                    </div>
                </div>
            </div>

            <!-- Generate Button -->
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition duration-200">
                Generate Multi-Page PDF
            </button>
        </form>

        <hr class="border-gray-600 my-8">

        <!-- Deliverable 3: Personalization Module -->
        <div>
            <h2 class="text-xl font-bold mb-2">Train Your Own Style</h2>
            <p class="text-sm text-gray-400 mb-4">Upload a photo of 5-10 handwritten words to create a custom preset.
            </p>
            <form action="/personalize" method="POST" enctype="multipart/form-data" class="flex items-center space-x-4">
                <input type="file" name="sample_image" accept="image/*"
                    class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
                    required>
                <button type="submit"
                    class="bg-gray-600 hover:bg-gray-500 text-white font-bold py-2 px-6 rounded transition duration-200">Train</button>
            </form>
        </div>

    </div>
</body>

</html>
